<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domina el Tema</title>

<style>

/* =========================
   FONDO DINÁMICO MORADO
=========================*/
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e1b4b,#5b21b6,#7c3aed);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  color:white;
  overflow-x:hidden;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px 30px 20px;
}

.hero h1{
  font-size:48px;
  margin:0;
}

.hero p{
  opacity:0.8;
  margin-top:10px;
  font-size:18px;
}

/* SECCIONES */
section{
  margin:40px 20px;
}

h2{
  margin-left:10px;
  font-weight:600;
}

/* CARRUSEL */
.carousel-wrapper{
  position:relative;
  display:flex;
  align-items:center;
}

.carousel{
  display:flex;
  gap:20px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding:20px;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#9333ea;
  border:none;
  color:white;
  font-size:28px;
  width:55px;
  height:55px;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
  z-index:5;
}

.arrow.left{ left:0; }
.arrow.right{ right:0; }

.arrow:hover{
  transform:translateY(-50%) scale(1.1);
}

/* TARJETAS */
.video-card{
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(8px);
  border-radius:16px;
  width:320px;
  flex-shrink:0;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.3s ease;
  position:relative;
}

.video-card:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.video-card iframe{
  width:100%;
  height:200px;
  border:none;
  border-radius:12px;
}

/* BLOQUEADO */
.locked{
  opacity:0.6;
  pointer-events:none;
}

.lock-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:50px;
  border-radius:16px;
}

/* BOTON PREMIUM */
.unlock-container{
  text-align:center;
  margin:50px 0;
}

.unlock-btn{
  background:#22c55e;
  border:none;
  padding:14px 32px;
  border-radius:12px;
  color:white;
  font-size:16px;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
  transition:0.3s;
}

.unlock-btn:hover{
  transform:scale(1.05);
}

.unlock-card{
  background:rgba(0,0,0,0.5);
  max-width:400px;
  margin:20px auto;
  padding:20px;
  border-radius:16px;
  display:none;
  text-align:center;
}

.unlock-card input{
  width:80%;
  padding:10px;
  border:none;
  border-radius:8px;
  text-align:center;
}

</style>
</head>

<body>

<div class="hero">
  <h1>Domina el Tema</h1>
  <p>Explicaciones claras. Avance real. Sin confusión.</p>
</div>

<!-- FREE -->

<section>
  <h2>Contenido en Español – Acceso Inicial</h2>
  <div class="carousel-wrapper">
    <button class="arrow left" onclick="scrollCarousel('free',-1)">❮</button>
    <div class="carousel" id="carousel-free"></div>
    <button class="arrow right" onclick="scrollCarousel('free',1)">❯</button>
  </div>
</section>

<!-- NEUROELITE -->

<section>
  <h2>NEUROELITE</h2>
  <div class="carousel-wrapper">
    <button class="arrow left" onclick="scrollCarousel('premiumEs',-1)">❮</button>
    <div class="carousel" id="carousel-premiumEs"></div>
    <button class="arrow right" onclick="scrollCarousel('premiumEs',1)">❯</button>
  </div>
</section>

<!-- DESBLOQUEO -->

<div class="unlock-container">
  <button class="unlock-btn">🚀 Activar Nivel Avanzado</button>

  <div class="unlock-card" id="unlockCard">
    <p>Ingresa tu clave:</p>
    <input type="password" id="premiumKey" placeholder="Clave">
    <br><br>
    <button onclick="unlockPremium()">Entrar</button>
  </div>
</div>

<script>

const freeVideos = [
  "https://www.youtube.com/embed/Rp8h0XW9tY0",
  "https://www.youtube.com/embed/Ab_Sw8DpPbM",
  "https://www.youtube.com/embed/C1Fz4CJW1BA"
  ];

const premiumEs = [
  "https://www.youtube.com/embed/1NZ4BDy8kvw",
  "https://www.youtube.com/embed/P5160OdsjyM",
  "https://www.youtube.com/embed/hRmqfghE5Go"
];

function generateVideos(list, containerId, locked=false){
  const container = document.getElementById(containerId);

  list.forEach(link=>{
    const card = document.createElement("div");
    card.classList.add("video-card");
    if(locked) card.classList.add("locked");

    card.innerHTML = `
      <iframe ${locked ? `data-src="${link}"` : `src="${link}"`} allowfullscreen></iframe>
      ${locked ? `<div class="lock-overlay">🔒</div>` : ""}
    `;

    container.appendChild(card);
  });
}

generateVideos(freeVideos,"carousel-free");
generateVideos(premiumEs,"carousel-premiumEs",true);

document.querySelector('.unlock-btn').addEventListener('click',()=>{
  const card = document.getElementById("unlockCard");
  card.style.display = card.style.display === "block" ? "none" : "block";
});

function unlockPremium(){
  const key = document.getElementById("premiumKey").value;

  if(key === "552455"){
    document.querySelectorAll(".video-card.locked").forEach(card=>{
      const iframe = card.querySelector("iframe");
      iframe.src = iframe.dataset.src;
      card.classList.remove("locked");
      card.querySelector(".lock-overlay").remove();
      card.style.pointerEvents="auto";
      card.style.opacity="1";
    });

    alert("NEUROELITE activado 🎉");
  }else{
    alert("Clave incorrecta");
  }
}

function scrollCarousel(id,direction){
  const carousel = document.getElementById("carousel-"+id);
  carousel.scrollBy({
    left: direction * 350,
    behavior:"smooth"
  });
}

</script>

</body>
</html>
